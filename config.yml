backend:
  name: github
  repo: siremiren/mma-website
  branch: main

media_folder: "images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "content/home.json"
        fields:
          - { label: "Hero Label", name: "hero_label", widget: "string", default: "Business Education & Implementation" }
          - { label: "Hero Heading", name: "hero_heading", widget: "string", default: "Turning capable people into operating founders." }
          - { label: "Hero Paragraph", name: "hero_paragraph", widget: "text" }
          - { label: "Stat 1 Number", name: "stat1_num", widget: "string", default: "10+" }
          - { label: "Stat 1 Label", name: "stat1_txt", widget: "string", default: "Years Coaching" }
          - { label: "Stat 2 Number", name: "stat2_num", widget: "string", default: "3" }
          - { label: "Stat 2 Label", name: "stat2_txt", widget: "string", default: "Continents" }
          - { label: "Stat 3 Number", name: "stat3_num", widget: "string", default: "90%" }
          - { label: "Stat 3 Label", name: "stat3_txt", widget: "string", default: "Of New Businesses Fail Within 3 Years" }
          - { label: "Stat 4 Number", name: "stat4_num", widget: "string", default: "5.5M" }
          - { label: "Stat 4 Label", name: "stat4_txt", widget: "string", default: "SMEs in the UK" }
          - { label: "Problem Heading", name: "problem_heading", widget: "string" }
          - { label: "Problem Paragraph 1", name: "problem_p1", widget: "text" }
          - { label: "Problem Paragraph 2", name: "problem_p2", widget: "text" }
          - { label: "Problem Paragraph 3", name: "problem_p3", widget: "text" }
          - { label: "Impact Heading", name: "impact_heading", widget: "string" }
          - { label: "Impact Paragraph 1", name: "impact_p1", widget: "text" }
          - { label: "Impact Paragraph 2", name: "impact_p2", widget: "text" }
          - { label: "Impact Paragraph 3", name: "impact_p3", widget: "text" }

      - name: "about"
        label: "About Page"
        file: "content/about.json"
        fields:
          - { label: "Founder Bio Paragraph 1", name: "founder_p1", widget: "text" }
          - { label: "Founder Bio Paragraph 2", name: "founder_p2", widget: "text" }
          - { label: "Founder Bio Paragraph 3", name: "founder_p3", widget: "text" }
          - { label: "Story Paragraph 1", name: "story_p1", widget: "text" }
          - { label: "Story Paragraph 2", name: "story_p2", widget: "text" }
          - { label: "Story Paragraph 3", name: "story_p3", widget: "text" }

      - name: "programmes"
        label: "Programmes Page"
        file: "content/programmes.json"
        fields:
          - { label: "Individuals Intro", name: "individuals_intro", widget: "text" }
          - { label: "Organisations Intro", name: "organisations_intro", widget: "text" }

  - name: "images"
    label: "Site Images"
    files:
      - name: "site_images"
        label: "Upload Images"
        file: "content/images.json"
        fields:
          - { label: "Hero Image", name: "hero_img", widget: "image", required: false }
          - { label: "Founder Portrait", name: "founder_img", widget: "image", required: false }
          - { label: "Whiteboard Photo", name: "whiteboard_img", widget: "image", required: false }
          - { label: "Coaching Photo", name: "coaching_img", widget: "image", required: false }
          - { label: "Community Event Photo", name: "community_img", widget: "image", required: false }
          - { label: "Institutional Setting Photo", name: "institutional_img", widget: "image", required: false }
